services:
  wordpress:
    container_name: ${APP_NAME}_wordpress
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - mysql
    networks:
      - public
    environment:
      WORDPRESS_DB_HOST: ${MYSQL_ADDRESS}:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wp:/var/www/html/
      - ./theme:/var/www/html/wp-content/themes/default
      - ./config/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini


networks:
  public:
    name: public-net
    external: true


volumes:
  wp:
    name: ${APP_NAME}_wp
    external: false